apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-demo
  template:
    metadata:
      labels:
        app: spring-demo
    spec:
      containers:
        - name: spring-demo
          image: keerthana2003bggowd/spring-demo
          ports:
            - containerPort: 9090
            
---
apiVersion: v1
kind: Service
metadata:
  name: spring-demo-svc
spec:
  type: NodePort
  selector:
    app: spring-demo
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090